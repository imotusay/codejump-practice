<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>Recipe Diary | おいしい毎日の手作り料理レシピ</title>
    <!-- 「テキスト…」から、レシピサイトとして自然で魅力的な紹介文に置換 -->
    <meta name="description" content="日々の手作り料理レシピを記録するブログ。和食、洋食、中華から簡単なお菓子まで、毎日の献立に役立つ美味しいレシピを写真付きでご紹介しています。">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="img/favicon.ico">
    <!-- リセットCSSの読み込みパス（リポジトリの構成に合わせて適宜調整してください） -->
    <link rel="stylesheet" href="../common/ress.min.css">
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <main>
      <!-- メインビジュアルの画像に適切な代替テキスト(alt)を設定 -->
      <div id="mainvisual">
        <img src="img/mainvisual.jpg" alt="美味しそうなお皿が並ぶRecipe Diaryのメインビジュアル画像">
      </div>

      <div class="text">
        <h1 class="site-title">Recipe Diary</h1>
        <p>
          日々の料理レシピをまとめています。<br>
          和食や洋食、中華、お菓子までいろいろな料理レシピをアップしていますので、<br>
          みなさんの献立にお役立てくださいね！
        </p>
      </div>

      <!-- レシピ画像一覧。alt属性に料理の内容（想定）を記述し、アクセシビリティを向上 -->
      <ul class="flex">
        <li><img src="img/recipe1.jpg" alt="色鮮やかな手作りサラダの料理写真"></li>
        <li><img src="img/recipe2.jpg" alt="焼きたてで香ばしい自家製パンの写真"></li>
        <li><img src="img/recipe3.jpg" alt="じっくり煮込んだ特製トマトパスタの料理写真"></li>
      </ul>

      <div class="text">
        <!-- 一覧へのリンク（現在はダミー#ですが、後々ページを作る場合はパスを記述します） -->
        <a class="btn" href="#">レシピ一覧を見る</a>
      </div>
    </main>

    <footer id="footer">
      <ul class="sns">
        <!-- 外部SNSリンクを想定し、セキュリティとタブ動作を最適化（target="_blank"等） -->
        <li><a href="https://instagram.com" target="_blank" rel="noopener noreferrer">Instagram</a></li>
        <li><a href="https://twitter.com" target="_blank" rel="noopener noreferrer">X (Twitter)</a></li>
        <li><a href="https://facebook.com" target="_blank" rel="noopener noreferrer">Facebook</a></li>
      </ul>
      <!-- 著作権の表記年を最新に更新（必要に応じて変更してください） -->
      <p>&copy; 2026 Recipe Diary</p>
    </footer>
  </body>
</html>
