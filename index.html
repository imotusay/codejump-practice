<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コーディング練習</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>【HTML / CSS】コーディング練習</h1>
  </header>

  <main>
    <section class="intro">
      <h2>【入門編】基礎学習を終えた後のウォーミングアップ用の練習サイト</h2>
    </section>

    <!-- カードを横並びにするコンテナ -->
    <div class="card-container">

      <!-- 左側のカード -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="profile/img/mainvisual.jpg" alt="Profileのプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="#" class="btn">HTML/CSS コーディング練習</a>
          <a href="#" class="btn btn-demo">デモ</a>
        </div>
        <div class="card-info">
          <h3>Profile</h3>
          <p>プロフィールサイト / 1カラム</p>
        </div>
      </article>

      <!-- 右側のカード -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="photo/img/mainvisual.jpg" alt="PHOTO BOOKのプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="#" class="btn">HTML/CSS コーディング練習</a>
          <a href="#" class="btn btn-demo">デモ</a>
        </div>
        <div class="card-info">
          <h3>PHOTO BOOK</h3>
          <p>フォトサイト / 1カラム</p>
        </div>
      </article>

    </div>
  </main>

</body>
</html>
