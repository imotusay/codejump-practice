<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コーディング練習</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>【HTML / CSS】コーディング練習</h1>
  </header>

  <main>
    <section class="intro">
      <h2>【入門編】基礎学習を終えた後のウォーミングアップ用の練習サイト</h2>
    </section>

    <!-- カードを並べるコンテナ -->
    <div class="card-container">

      <!-- 1つ目のカード（Profile） -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="profile/img/mainvisual.jpg" alt="Profileのプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="./profile/" class="btn">プロフィールサイト 課題</a>
        </div>
      </article>

      <!-- 2つ目のカード（PHOTO BOOK） -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="photo/img/mainvisual.jpg" alt="PHOTO BOOKのプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="./photo/" class="btn">PHOTO BOOK 課題</a>
        </div>
      </article>

      <!-- 3つ目のカード（PHOTO BOOK 2） ※新規追加 -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="photo2/img/mainvisual.jpg" alt="PHOTO BOOK 2のプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="./photo2/" class="btn">PHOTO BOOK 2 課題</a>
        </div>
      </article>

    </div>
  </main>

</body>
</html>
