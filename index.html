<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>コーディング練習</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>【HTML / CSS】コーディング練習</h1>
  </header>

  <main>
    <!-- ==========================================================================
       【入門編】セクション
       ========================================================================== -->
    <section class="intro">
      <h2>【入門編】基礎学習を終えた後のウォーミングアップ用の練習サイト</h2>
    </section>

    <!-- 入門編カードコンテナ -->
    <div class="card-container">

      <!-- 1つ目のカード（Profile） -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="profile/img/mainvisual.jpg" alt="Profileのプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="./profile/" class="btn">プロフィールサイト 課題</a>
        </div>
      </article>

      <!-- 2つ目のカード（PHOTO BOOK） -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="photo/img/mainvisual.jpg" alt="PHOTO BOOKのプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="./photo/" class="btn">PHOTO BOOK 課題</a>
        </div>
      </article>

      <!-- 3つ目のカード（PHOTO BOOK 2） -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="photo2/img/mainvisual.jpg" alt="PHOTO BOOK 2のプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="./photo2/" class="btn">PHOTO BOOK 2 課題</a>
        </div>
      </article>

      <!-- 4つ目のカード（Recipe） -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="recipe/img/mainvisual.jpg" alt="Recipeのプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="./recipe/" class="btn">RECIPE 課題</a>
        </div>
      </article>

      <!-- 5つ目のカード（Recipe 2） -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="recipe2/img/mainvisual.jpg" alt="Recipe 2のプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="./recipe2/" class="btn">RECIPE 2 課題</a>
        </div>
      </article>

      <!-- 6つ目のカード（Brand） -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="brand/img/mainvisual.jpg" alt="Brandのプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="./brand/" class="btn">BRAND SITE 課題</a>
        </div>
      </article>

    </div>

    <!-- ==========================================================================
       【初級編】セクション
       ========================================================================== -->
    <section class="intro">
      <h2>【初級編】かんたんなHTML、CSSでできるシンプルな練習サイト</h2>
    </section>

    <!-- 初級編カードコンテナ -->
    <div class="card-container">

      <!-- 7つ目のカード（Portfolio1） -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="portfolio1/img/mainvisual-pc.jpg" alt="My Work ポートフォリオのプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="./portfolio1/" class="btn">PORTFOLIO（My Work）課題</a>
        </div>
      </article>

      <!-- 8つ目のカード（Store1） -->
      <article class="card">
        <div class="card-img-wrapper">
          <img src="store1/img/mainvisual.jpg" alt="Store1のプレビュー画像">
        </div>
        <div class="card-buttons">
          <a href="./store1/" class="btn">STORE1 課題</a>
        </div>
      </article>

    </div>
  </main>

</body>
</html>
